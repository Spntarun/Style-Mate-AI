{% extends 'base.html' %}
{% block title %}Admin Login - Style Mate{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon admin-auth-icon">🛡️</div>
            <h1>Admin Portal</h1>
            <p>Platform administration access</p>
        </div>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" name="email" required placeholder="admin@StyleMate.com"
                    class="form-control">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-toggle">
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="form-control">
                    <button type="button" class="toggle-pass" onclick="togglePassword('password')">👁</button>
                </div>
            </div>
            <button type="submit" class="btn btn-admin btn-full btn-lg">Admin Sign In</button>
        </form>
        <div class="auth-footer">
            <p style="font-size:0.85rem;opacity:0.7">Default: admin@StyleMate.com / admin123</p>
        </div>
    </div>
</div>
{% endblock %}
