{% extends 'base.html' %}
{% block title %}User Login - Style Mate{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">👤</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your Style Mate account</p>
        </div>

        <form method="post" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com" class="form-control">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-toggle">
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="form-control">
                    <button type="button" class="toggle-pass" onclick="togglePassword('password')">👁</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('user.register') }}">Create one</a></p>
            <div class="auth-divider">
                <span>Other access</span>
            </div>
            <div class="auth-links">
                <a href="{{ url_for('vendor.login') }}" class="auth-link-btn">Vendor Login</a>
                <a href="{{ url_for('admin.login') }}" class="auth-link-btn">Admin Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
