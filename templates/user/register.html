{% extends 'base.html' %}
{% block title %}Register - Style Mate{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <div class="auth-icon">✨</div>
            <h1>Join Style Mate</h1>
            <p>Create your personalized fashion account</p>
        </div>

        <form method="post" class="auth-form" id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name" class="form-control">
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-control">
                        <option value="">Select Gender</option>
                        <option value="female">Female</option>
                        <option value="male">Male</option>
                        <option value="unisex">Prefer not to say</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com" class="form-control">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-with-toggle">
                        <input type="password" id="password" name="password" required placeholder="Min. 8 characters"
                            class="form-control">
                        <button type="button" class="toggle-pass" onclick="togglePassword('password')">👁</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-with-toggle">
                        <input type="password" id="confirm_password" name="confirm_password" required
                            placeholder="Repeat password" class="form-control">
                        <button type="button" class="toggle-pass"
                            onclick="togglePassword('confirm_password')">👁</button>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('user.login') }}">Sign in</a></p>
            <p>Want to sell? <a href="{{ url_for('vendor.register') }}">Register as Vendor</a></p>
        </div>
    </div>
</div>
{% endblock %}
